<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Aquamed</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile_style.css') }}">
    <!--  ADD CUSTOM MODAL CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modal_style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="profile-section">
        <div class="container">
            
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-avatar">
                    <img id="avatarImage" src="{{ url_for('static', filename='images/member3.jpg') }}" alt="Profile Picture">
                    <button class="edit-avatar-btn" onclick="document.getElementById('avatarInput').click()">
                        <i class="fas fa-camera"></i>
                    </button>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="updateAvatar(event)">
                </div>
                
                <div class="profile-info">
                    <h1 id="profileUsername">Welcome!</h1>
                    <p class="member-since" id="memberSince">Member since: 2025</p>
                </div>
            </div>

            <!-- Profile Content -->
            <div class="profile-content">
                
                <!-- Account Information Card -->
                <div class="info-card">
                    <div class="card-header">
                        <h2><i class="fas fa-user-circle"></i> Account Information</h2>
                        <button class="edit-btn" onclick="toggleEdit('account')">
                            <i class="fas fa-edit"></i> Change Password
                        </button>
                    </div>
                    
                    <div class="card-body" id="accountInfo">
                        <div class="info-row">
                            <label>Username</label>
                            <span id="displayUsername">Loading...</span>
                        </div>
                        
                        <div class="save-buttons" id="accountSaveButtons" style="display: none;">
                            <button class="btn-save" onclick="saveChanges('account')">
                                <i class="fas fa-key"></i> Update Password
                            </button>
                            <button class="btn-cancel" onclick="cancelEdit('account')">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Activity Statistics Card -->
                <div class="info-card">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-line"></i> Your Activity</h2>
                    </div>
                    
                    <div class="card-body">
                        <div class="stats-grid">
                            <div class="stat-item">
                                <i class="fas fa-microscope"></i>
                                <div class="stat-info">
                                    <h3 id="totalScans">0</h3>
                                    <p>Total Scans</p>
                                </div>
                            </div>
                            
                            <div class="stat-item">
                                <i class="fas fa-fish"></i>
                                <div class="stat-info">
                                    <h3 id="diseasesDetected">0</h3>
                                    <p>Diseases Detected</p>
                                </div>
                            </div>
                            
                            <div class="stat-item">
                                <i class="fas fa-check-circle"></i>
                                <div class="stat-info">
                                    <h3 id="healthyFish">0</h3>
                                    <p>Healthy Fish</p>
                                </div>
                            </div>
                            
                            <div class="stat-item">
                                <i class="fas fa-calendar-alt"></i>
                                <div class="stat-info">
                                    <h3 id="lastScan">Never</h3>
                                    <p>Last Scan</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Scans History -->
                <div class="info-card">
                    <div class="card-header">
                        <h2><i class="fas fa-history"></i> Recent Scans</h2>
                        <a href="/upload" style="color: #00bcd4; text-decoration: none; font-size: 0.9rem;">
                            <i class="fas fa-plus-circle"></i> New Scan
                        </a>
                    </div>
                    
                    <div class="card-body">
                        <div class="scan-photos-grid">
                            <p style="text-align: center; color: #888;">Loading scans...</p>
                        </div>
                    </div>
                </div>

                <!-- Danger Zone -->
                <div class="info-card danger-card">
                    <div class="card-header">
                        <h2><i class="fas fa-exclamation-triangle"></i> Account Actions</h2>
                    </div>
                    
                    <div class="card-body">
                        <div class="danger-actions">
                            <button class="btn-logout" onclick="handleLogout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                            
                            <button class="btn-delete" onclick="confirmDeleteAccount()">
                                <i class="fas fa-trash-alt"></i> Delete Account
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!--  Scripts in correct order -->
    <script src="{{ url_for('static', filename='js/navbar_script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth_script.js') }}"></script>
    <!--  ADD CUSTOM MODAL SCRIPT BEFORE PROFILE SCRIPT -->
    <script src="{{ url_for('static', filename='js/modal_script.js') }}"></script>
    <script src="{{ url_for('static', filename='js/profile_script_v2.js') }}"></script>



</body>
</html>
